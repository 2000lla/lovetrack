<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>爱合 · 轨迹回放</title>
  <style>
    /* ════════════════════════════════════════════════════════════════
       Design tokens — 与 love-location 一致
       ════════════════════════════════════════════════════════════════ */
    :root {
      --color-primary: #ff5b9c;
      --color-primary-hover: #e7407f;
      --color-primary-soft: #fff0f6;
      --color-primary-fg: #ffffff;
      --color-violet: #8b5cf6;
      --color-violet-soft: #f3edff;
      --color-violet-hover: #7c3aed;
      --color-coral: #ff8fa3;
      --color-peach: #ffd5a8;

      --color-bg: #fef7fb;
      --color-surface: #ffffff;
      --color-surface-2: #fff5fa;
      --color-border: #f3e1ec;
      --color-border-strong: #ff5b9c;
      --color-text: #2a1430;
      --color-text-muted: #8a7c8a;
      --color-text-subtle: #b5a8b8;

      --color-success: #22c55e; --color-success-soft: #ecfdf5; --color-success-fg: #15803d;
      --color-warning: #f59e0b; --color-warning-soft: #fffbeb; --color-warning-fg: #b45309;
      --color-danger:  #ef4444; --color-danger-soft:  #fef2f2; --color-danger-fg:  #b91c1c;
      --color-info:    #8b5cf6; --color-info-soft:    #f3edff; --color-info-fg:    #7c3aed;

      --font-sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-emoji: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

      --text-xs: 12px; --text-sm: 13px; --text-base: 14px; --text-md: 15px;
      --text-lg: 16px; --text-xl: 18px; --text-2xl: 22px; --text-3xl: 28px; --text-4xl: 36px;
      --leading-tight: 1.25; --leading-snug: 1.4; --leading-base: 1.55;
      --weight-regular: 400; --weight-medium: 500; --weight-semibold: 600; --weight-bold: 700;

      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 22px;
      --radius-2xl: 28px;
      --radius-full: 9999px;

      --shadow-xs: 0 1px 2px rgba(255,91,156,0.06);
      --shadow-sm: 0 2px 8px rgba(255,91,156,0.08), 0 1px 3px rgba(139,92,246,0.04);
      --shadow-md: 0 8px 24px rgba(255,91,156,0.12), 0 2px 6px rgba(139,92,246,0.06);
      --shadow-lg: 0 18px 48px rgba(255,91,156,0.18), 0 4px 12px rgba(139,92,246,0.08);

      --motion-fast: 120ms;
      --motion-base: 200ms;
      --motion-slow: 320ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --z-base: 0; --z-raised: 10; --z-sticky: 100;
      --z-overlay: 500; --z-modal: 1000; --z-toast: 2000;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: var(--leading-base);
      color: var(--color-text);
      background:
        radial-gradient(1200px 600px at 0% -10%, #ffd5e8 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 100%, #e8d5ff 0%, transparent 60%),
        var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
      overflow-x: hidden;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }

    /* App shell */
    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 6px;
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
    }
    .status-bar .right { display: flex; gap: 6px; align-items: center; }
    .status-bar svg { width: 16px; height: 11px; }

    /* ════════ Top bar — 标题 + 返回 ════════ */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px 12px;
    }
    .topbar-back {
      width: 40px; height: 40px;
      border-radius: var(--radius-full);
      background: #fff;
      border: 1px solid var(--color-border);
      display: grid; place-items: center;
      box-shadow: var(--shadow-xs);
      color: var(--color-text);
      transition: transform var(--motion-fast) var(--ease-out);
    }
    .topbar-back:active { transform: scale(0.92); }
    .topbar-back svg { width: 20px; height: 20px; }
    .topbar-title {
      flex: 1;
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      display: flex; align-items: center; gap: 6px;
    }
    .topbar-title .emoji {
      font-family: var(--font-emoji);
      font-size: 22px;
    }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 40px; height: 40px;
      border-radius: var(--radius-full);
      background: #fff;
      border: 1px solid var(--color-border);
      display: grid; place-items: center;
      box-shadow: var(--shadow-xs);
      color: var(--color-text);
    }
    .icon-btn svg { width: 20px; height: 20px; }

    /* ════════ 日期选择器（横向滑动） ════════ */
    .date-strip {
      margin: 0 16px 14px;
      background: #fff;
      border-radius: var(--radius-2xl);
      padding: 14px 8px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
    }
    .date-strip-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 10px 10px;
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .date-strip-header strong {
      font-size: var(--text-md);
      color: var(--color-text);
      font-weight: var(--weight-semibold);
    }
    .date-strip-header .cal {
      font-family: var(--font-emoji);
    }
    .date-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 4px 8px;
    }
    .date-scroll::-webkit-scrollbar { display: none; }
    .date-day {
      flex: 0 0 auto;
      width: 56px;
      padding: 10px 6px 8px;
      border-radius: var(--radius-lg);
      background: var(--color-surface-2);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      border: 1.5px solid transparent;
      transition: all var(--motion-fast) var(--ease-out);
      scroll-snap-align: center;
      cursor: pointer;
    }
    .date-day:active { transform: scale(0.95); }
    .date-day .day-name {
      font-size: 11px;
      color: var(--color-text-muted);
      font-weight: var(--weight-medium);
    }
    .date-day .day-num {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .date-day .day-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: transparent;
      margin-top: 2px;
    }
    .date-day.has-data .day-dot { background: var(--color-primary); }
    .date-day.is-today {
      border-color: var(--color-border);
      background: #fff;
    }
    .date-day.is-today .day-name { color: var(--color-violet); }
    .date-day[data-active] {
      background: linear-gradient(135deg, #ff5b9c 0%, #b07aff 100%);
      border-color: transparent;
      box-shadow: 0 6px 16px rgba(255,91,156,0.35);
      color: #fff;
    }
    .date-day[data-active] .day-name,
    .date-day[data-active] .day-num { color: #fff; }
    .date-day[data-active] .day-dot { background: #fff; }

    /* ════════ 地图区 ════════ */
    .map-card {
      margin: 0 16px 12px;
      border-radius: var(--radius-2xl);
      overflow: hidden;
      background: linear-gradient(180deg, #e8f5e8 0%, #d6e9d6 100%);
      box-shadow: var(--shadow-md);
      position: relative;
      height: 240px;
    }
    .map-svg { width: 100%; height: 100%; display: block; }
    .map-compass {
      position: absolute; right: 12px; top: 12px;
      width: 40px; height: 40px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.95);
      box-shadow: var(--shadow-sm);
      display: grid; place-items: center;
      font-size: 11px; font-weight: var(--weight-bold);
      color: var(--color-violet);
      z-index: 5;
    }
    .map-overlay {
      position: absolute; left: 12px; top: 12px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 8px 12px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: var(--weight-semibold);
      z-index: 5;
    }
    .map-overlay .map-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(255,91,156,0.2);
    }

    /* 轨迹线段（CSS-driven: 由 class 切换透明度） */
    .track-seg {
      stroke: #ff5b9c;
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: opacity var(--motion-base) var(--ease-out);
    }
    .track-seg.is-past { opacity: 0.45; }
    .track-seg.is-active {
      stroke: url(#track-gradient);
      stroke-width: 5;
      filter: drop-shadow(0 0 6px rgba(255,91,156,0.5));
    }
    .track-seg.is-future { opacity: 0.15; stroke-dasharray: 4 4; }

    .track-stop { transition: r var(--motion-base) var(--ease-out); }
    .track-stop.is-past circle.inner { fill: var(--color-violet); }
    .track-stop.is-past { opacity: 0.55; }
    .track-stop.is-active circle.inner { fill: var(--color-primary); }
    .track-stop.is-future circle.inner { fill: #d8c4d0; }
    .track-stop.is-future { opacity: 0.4; }

    .track-head {
      filter: drop-shadow(0 4px 10px rgba(255,91,156,0.5));
      animation: head-bounce 1.6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes head-bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    /* ════════ 统计摘要 ════════ */
    .track-summary {
      margin: 0 16px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .summary-card {
      padding: 12px 14px;
      border-radius: var(--radius-xl);
      background: #fff;
      border: 1.5px solid var(--color-border);
      box-shadow: var(--shadow-xs);
      display: flex; flex-direction: column; gap: 4px;
    }
    .summary-icon { font-family: var(--font-emoji); font-size: 18px; }
    .summary-label { font-size: 11px; color: var(--color-text-muted); }
    .summary-value {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #ff5b9c 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .summary-value .unit {
      font-size: 11px;
      color: var(--color-text-muted);
      -webkit-text-fill-color: var(--color-text-muted);
      font-weight: var(--weight-medium);
      margin-left: 2px;
    }

    /* ════════ 时间轴拖动条 ════════ */
    .timeline {
      margin: 0 16px 14px;
      padding: 16px 18px 14px;
      border-radius: var(--radius-2xl);
      background: #fff;
      border: 1.5px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    .timeline-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .timeline-time {
      display: flex; align-items: center; gap: 8px;
    }
    .timeline-time .play-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #ff5b9c 0%, #b07aff 100%);
      border: 0;
      color: #fff;
      display: grid; place-items: center;
      box-shadow: 0 4px 12px rgba(255,91,156,0.4);
      transition: transform var(--motion-fast) var(--ease-spring);
    }
    .timeline-time .play-btn:active { transform: scale(0.92); }
    .timeline-time .play-btn svg { width: 18px; height: 18px; }
    .timeline-clock {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      font-variant-numeric: tabular-nums;
      color: var(--color-text);
      letter-spacing: 0.5px;
      line-height: 1;
    }
    .timeline-clock .sec {
      font-size: var(--text-lg);
      color: var(--color-text-muted);
      font-weight: var(--weight-semibold);
    }
    .timeline-speed {
      font-size: 11px;
      color: var(--color-text-muted);
      background: var(--color-violet-soft);
      padding: 3px 8px;
      border-radius: var(--radius-full);
      font-weight: var(--weight-semibold);
    }

    /* Slider track */
    .slider {
      position: relative;
      height: 56px;
      display: flex;
      align-items: center;
      user-select: none;
      touch-action: none;
      margin-top: 6px;
    }
    .slider-track {
      position: absolute;
      left: 0; right: 0; top: 50%;
      transform: translateY(-50%);
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      border: 1.5px solid var(--color-border);
      overflow: hidden;
    }
    .slider-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, #ff5b9c 0%, #b07aff 100%);
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 80ms linear;
    }
    .slider-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid var(--color-primary);
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 12px rgba(255,91,156,0.4);
      cursor: grab;
      transition: box-shadow var(--motion-fast) var(--ease-out), transform var(--motion-fast) var(--ease-out);
      display: grid; place-items: center;
    }
    .slider-thumb::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-primary);
    }
    .slider-thumb:active {
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 6px 16px rgba(255,91,156,0.55);
    }
    .slider-ticks {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      display: flex; justify-content: space-between;
      font-size: 10px;
      color: var(--color-text-subtle);
      font-variant-numeric: tabular-nums;
      font-weight: var(--weight-medium);
      padding: 0 2px;
    }

    /* ════════ 当前停留点信息 ════════ */
    .stop-card {
      margin: 0 16px 14px;
      padding: 14px 16px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #fff5fa 0%, #f3edff 100%);
      border: 1.5px solid rgba(255,91,156,0.15);
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow-xs);
    }
    .stop-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #ff5b9c 0%, #8b5cf6 100%);
      display: grid; place-items: center;
      font-size: 22px;
      font-family: var(--font-emoji);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255,91,156,0.3);
      flex-shrink: 0;
    }
    .stop-info { flex: 1; min-width: 0; }
    .stop-title {
      font-size: var(--text-md);
      font-weight: var(--weight-semibold);
      display: flex; align-items: center; gap: 6px;
    }
    .stop-title .emoji { font-family: var(--font-emoji); }
    .stop-sub {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .stop-duration {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #ff5b9c 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-variant-numeric: tabular-nums;
    }
    .stop-duration .unit {
      font-size: 11px;
      color: var(--color-text-muted);
      -webkit-text-fill-color: var(--color-text-muted);
      font-weight: var(--weight-medium);
    }

    /* ════════ Bottom nav — 4 tabs, 同 love-location ════════ */
    .bottom-nav-wrap {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: var(--z-sticky);
      pointer-events: none;
    }
    .bottom-nav {
      pointer-events: auto;
      max-width: 430px; margin: 0 auto;
      background: rgba(255,255,255,0.94);
      backdrop-filter: saturate(160%) blur(16px);
      -webkit-backdrop-filter: saturate(160%) blur(16px);
      border-top: 1px solid var(--color-border);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom, 0px));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .bn-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 4px 0 2px;
      color: var(--color-text-subtle);
      font-size: 10px;
      font-weight: var(--weight-medium);
      position: relative;
      transition: color var(--motion-fast) var(--ease-out);
    }
    .bn-item svg { width: 22px; height: 22px; }
    .bn-item[data-active] { color: var(--color-primary); }
    .bn-item[data-active]::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 3px;
      border-radius: 0 0 var(--radius-full) var(--radius-full);
      background: linear-gradient(90deg, var(--color-primary), var(--color-violet));
    }

    /* Toast */
    .toast-stack {
      position: fixed; left: 50%; bottom: 110px;
      transform: translateX(-50%);
      z-index: var(--z-toast);
      display: flex; flex-direction: column; gap: 8px;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      background: linear-gradient(135deg, #2a1430 0%, #3a1f44 100%);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: var(--weight-medium);
      box-shadow: var(--shadow-md);
      animation: toast-in 0.3s var(--ease-spring);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .toast .emoji { font-family: var(--font-emoji); }
    .toast.toast-leaving { animation: toast-out 0.25s ease-in forwards; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toast-out {
      to { opacity: 0; transform: translateY(20px); }
    }

    /* BG stickers */
    .bg-stickers {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .bg-stickers span {
      position: absolute;
      font-family: var(--font-emoji);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite;
    }
    .bg-stickers span:nth-child(1) { top: 12%; left: 4%;  font-size: 24px; animation-delay: 0s; }
    .bg-stickers span:nth-child(2) { top: 36%; right: 6%; font-size: 20px; animation-delay: 2s; }
    .bg-stickers span:nth-child(3) { top: 70%; left: 3%;  font-size: 22px; animation-delay: 4s; }
    .bg-stickers span:nth-child(4) { top: 86%; right: 8%; font-size: 18px; animation-delay: 6s; }
    @keyframes drift {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      50%      { transform: translate(8px, -10px) rotate(8deg); }
    }
    .app { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="bg-stickers" aria-hidden="true">
    <span>💕</span><span>✨</span><span>💗</span><span>🌸</span>
  </div>

  <div class="app">
    <!-- Status bar -->
    <div class="status-bar">
      <span>22:55</span>
      <span class="right">
        <svg viewBox="0 0 16 11" fill="currentColor"><path d="M1 7h2v3H1zM5 5h2v5H5zM9 3h2v7H9zM13 0h2v10h-2z"/></svg>
        <svg viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M8 3C5.5 3 3.2 4 1.5 5.7L8 11l6.5-5.3C12.8 4 10.5 3 8 3z" fill="currentColor"/>

  <div class="toast-stack" id="toasts" aria-live="polite"></div>

  <script>
    /* ════════════════════════════════════════════════════════════════
       Toast 工具
       ════════════════════════════════════════════════════════════════ */
    function toast(message, opts = {}) {
      const stack = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = 'toast';
      const emoji = opts.emoji;
      el.innerHTML = (emoji ? `<span class="emoji">${emoji}</span>` : '') +
                     `<span>${message}</span>`;
      stack.appendChild(el);
      const ttl = opts.duration ?? 2200;
      setTimeout(() => el.classList.add('toast-leaving'), ttl - 220);
      setTimeout(() => el.remove(), ttl);
    }

    /* ════════════════════════════════════════════════════════════════
       日期选择器
       ════════════════════════════════════════════════════════════════ */
    const DAYS = [
      { date: '11-19', weekday: '周三', hasData: true },
      { date: '11-20', weekday: '周四', hasData: true },
      { date: '11-21', weekday: '周五', hasData: true },
      { date: '11-22', weekday: '周六', hasData: true, isToday: true, isActive: true },
      { date: '11-23', weekday: '周日', hasData: true },
      { date: '11-24', weekday: '周一', hasData: false },
    ];

    const dateScroll = document.getElementById('dateScroll');
    DAYS.forEach((d, i) => {
      const div = document.createElement('div');
      div.className = 'date-day';
      if (d.hasData) div.classList.add('has-data');
      if (d.isToday) div.classList.add('is-today');
      if (d.isActive) div.setAttribute('data-active', '');
      const num = d.date.split('-')[1];
      div.innerHTML = `
        <span class="day-name">${d.weekday}</span>
        <span class="day-num">${num}</span>
        <span class="day-dot"></span>
      `;
      div.addEventListener('click', () => {
        document.querySelectorAll('.date-day').forEach(x => x.removeAttribute('data-active'));
        div.setAttribute('data-active', '');
        toast(`切换到 11月 ${num}日`, { emoji: '📅' });
      });
      dateScroll.appendChild(div);
    });

    // 自动滚动到激活日
    setTimeout(() => {
      const active = document.querySelector('.date-day[data-active]');
      if (active) active.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
    }, 100);

    /* ════════════════════════════════════════════════════════════════
       时间轴 — 拖动 / 播放
       ════════════════════════════════════════════════════════════════ */
    const T_START = 15 * 60;        // 15:00 → 900
    const T_END   = 15 * 60 + 20;   // 15:20 → 920
    const T_TOTAL = T_END - T_START;

    // 停留点（按时间顺序）
    const STOPS = [
      { idx: 0, time: 15 * 60 + 0,  emoji: '🏠', title: '家里',     sub: '14:30 抵达 · 准备出门',   dur: '30' },
      { idx: 1, time: 15 * 60 + 4,  emoji: '🛍️', title: '万达广场', sub: '15:04 到达 · 逛街中',      dur: '18' },
      { idx: 2, time: 15 * 60 + 8,  emoji: '🎓', title: '山大科技产业园', sub: '15:08 到达 · 工作地点', dur: '52' },
      { idx: 3, time: 15 * 60 + 13, emoji: '☕', title: '星巴克 (山大店)', sub: '15:13 到达 · 下午茶', dur: '25' },
      { idx: 4, time: 15 * 60 + 17, emoji: '🌳', title: '历城公园', sub: '15:17 到达 · 散步中',     dur: '15' },
      { idx: 5, time: 15 * 60 + 20, emoji: '🏠', title: '家里',     sub: '15:20 返回 · 结束',       dur: '0'  },
    ];

    const slider       = document.getElementById('slider');
    const sliderFill   = document.getElementById('sliderFill');
    const sliderThumb  = document.getElementById('sliderThumb');
    const clockEl      = document.getElementById('clock');
    const playBtn      = document.getElementById('playBtn');
    const playIcon     = document.getElementById('playIcon');
    const speedBadge   = document.getElementById('speedBadge');

    const stopIcon     = document.getElementById('stopIcon');
    const stopTitle    = document.getElementById('stopTitle');
    const stopSub      = document.getElementById('stopSub');
    const stopDur      = document.getElementById('stopDur');

    const trackHead    = document.getElementById('trackHead');
    const segs         = Array.from(document.querySelectorAll('.track-seg'));
    const stops        = Array.from(document.querySelectorAll('.track-stop'));

    let currentTime = T_START;
    let isPlaying = false;
    let playSpeed = 1; // 1×, 2×, 4×
    let rafId = null;
    let lastTick = 0;

    function timeToPct(t) {
      return ((t - T_START) / T_TOTAL) * 100;
    }
    function pctToTime(pct) {
      return T_START + (pct / 100) * T_TOTAL;
    }
    function formatClock(t) {
      // 时间窗 15:00 - 15:20，共 20 秒（秒 = 4 帧的播放速度）
      // 把 t (秒级浮点) 映射到 [15:00:00, 15:00:20]
      const mm = 15;
      const ss = Math.max(0, Math.min(20, Math.round(t - T_START)));
      return { main: `${String(mm).padStart(2,'0')}:00`, sec: `:${String(ss).padStart(2,'0')}` };
    }

    function findActiveStop(t) {
      let active = STOPS[0];
      for (const s of STOPS) {
        if (t >= s.time) active = s;
      }
      return active;
    }

    function render(t) {
      const pct = timeToPct(t);
      sliderFill.style.width = pct + '%';
      sliderThumb.style.left = pct + '%';
      const c = formatClock(t);
      clockEl.innerHTML = `${c.main}<span class="sec">${c.sec}</span>`;

      const active = findActiveStop(t);
      stopIcon.textContent  = active.emoji;
      stopTitle.innerHTML   = `<span class="emoji">${active.emoji}</span>${active.title}`;
      stopSub.textContent   = active.sub;
      stopDur.innerHTML     = `${active.dur}<span class="unit">min</span>`;

      // 段颜色
      segs.forEach((seg, i) => {
        seg.classList.remove('is-past','is-active','is-future');
        const segStart = STOPS[i].time;
        const segEnd   = STOPS[i + 1].time;
        if (t >= segEnd)      seg.classList.add('is-past');
        else if (t >= segStart) seg.classList.add('is-active');
        else                   seg.classList.add('is-future');
      });

      // 停留点颜色
      stops.forEach(stop => {
        const idx = +stop.dataset.idx;
        stop.classList.remove('is-past','is-active','is-future');
        const stopTime = STOPS[idx].time;
        if (t > stopTime + 1)  stop.classList.add('is-past');
        else if (t >= stopTime - 0.5) stop.classList.add('is-active');
        else                   stop.classList.add('is-future');
      });

      // 头标位置（线性插值段 0~5）
      const headPos = interpolate(t);
      trackHead.setAttribute('transform', `translate(${headPos.x}, ${headPos.y})`);
    }

    /* 段内线性插值 — 简化为相邻停留点之间 */
    function interpolate(t) {
      // 先按段找
      for (let i = 0; i < STOPS.length - 1; i++) {
        const a = STOPS[i], b = STOPS[i + 1];
        if (t >= a.time && t <= b.time) {
          const p = (t - a.time) / Math.max(1, b.time - a.time);
          const aPos = stops[i].transform.baseVal.consolidate().matrix;
          const bPos = stops[i + 1].transform.baseVal.consolidate().matrix;
          return {
            x: aPos.e + (bPos.e - aPos.e) * p,
            y: aPos.f + (bPos.f - aPos.f) * p,
          };
        }
      }
      // 超过最后一个 → 停在终点
      const lastPos = stops[stops.length - 1].transform.baseVal.consolidate().matrix;
      return { x: lastPos.e, y: lastPos.f };
    }

    // 拖动
    function updateFromEvent(clientX) {
      const rect = slider.getBoundingClientRect();
      const pct = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
      currentTime = pctToTime(pct);
      render(currentTime);
    }
    let dragging = false;
    function onDown(e) {
      dragging = true;
      sliderThumb.style.cursor = 'grabbing';
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      updateFromEvent(x);
      pause();
    }
    function onMove(e) {
      if (!dragging) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      updateFromEvent(x);
      e.preventDefault();
    }
    function onUp() {
      dragging = false;
      sliderThumb.style.cursor = 'grab';
    }
    slider.addEventListener('mousedown', onDown);
    slider.addEventListener('touchstart', onDown, { passive: true });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);

    // 播放 / 暂停
    function play() {
      isPlaying = true;
      playIcon.innerHTML = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
      lastTick = performance.now();
      const tick = (now) => {
        if (!isPlaying) return;
        const dt = (now - lastTick) / 1000;  // 秒
        lastTick = now;
        currentTime += dt * playSpeed * 4;    // 4 = 把 20 秒压缩到 5 秒播完
        if (currentTime >= T_END) {
          currentTime = T_END;
          pause();
        }
        render(currentTime);
        if (isPlaying) rafId = requestAnimationFrame(tick);
      };
      rafId = requestAnimationFrame(tick);
    }
    function pause() {
      isPlaying = false;
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      if (rafId) cancelAnimationFrame(rafId);
    }
    playBtn.addEventListener('click', () => {
      if (isPlaying) { pause(); toast('已暂停', { emoji: '⏸️' }); }
      else {
        if (currentTime >= T_END - 0.1) currentTime = T_START;
        play();
        toast(`正在回放 ${playSpeed}×`, { emoji: '▶️' });
      }
    });

    // 倍速切换
    speedBadge.addEventListener('click', () => {
      const cycle = [1, 2, 4];
      const idx = cycle.indexOf(playSpeed);
      playSpeed = cycle[(idx + 1) % cycle.length];
      speedBadge.textContent = playSpeed + '×';
      toast(`播放速度：${playSpeed}×`, { emoji: '⚡' });
    });

    // 初始渲染
    render(currentTime);

    // 底部导航
    document.querySelectorAll('.bn-item').forEach(item => {
      item.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.bn-item').forEach(i => i.removeAttribute('data-active'));
        item.setAttribute('data-active', '');
        const label = item.querySelector('span')?.textContent || '';
        if (label === '位置') return;
        toast(`切换到「${label}」`, { emoji: '🧭' });
      });
    });

    // 返回
    document.querySelector('.topbar-back').addEventListener('click', () => {
      toast('返回位置页', { emoji: '↩️' });
    });
    document.querySelector('.icon-btn').addEventListener('click', () => {
      toast('打开日历选择', { emoji: '📅' });
    });

    // 入场提示
    setTimeout(() => toast('11/22 共 6 个停留点', { emoji: '🗺️', duration: 2600 }), 600);
  </script>
</body>
</html>
