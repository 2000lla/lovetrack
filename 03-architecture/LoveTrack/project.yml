name: LoveTrack
options:
  bundleIdPrefix: com.lovetrack
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
configs:
  Debug: debug
  Release: release
# xcodegen 默认不自动生成 scheme, 显式声明避免每次 generate 覆盖 Xcode user scheme
schemes:
  LoveTrack:
    build:
      targets:
        LoveTrack: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  LoveTrack:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Location
      - path: Map
      - path: Models
      - path: Network
      - path: Relationship
      - path: UI
    # Secrets (API keys 等) 走独立 xcconfig，已 gitignore
    # 缺失时 xcodegen 仍能 generate, 但编译会因 key 为空失败
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    # 第三方 SDK framework (手动集成, 不走 CocoaPods/SPM)
    # 同步需在 Vendor/AMap/ 下放置 .framework 二进制
    dependencies:
      - framework: Vendor/AMap/MAMapKit.framework
        embed: true
      - framework: Vendor/AMap/AMapFoundationKit.framework
        embed: true
      # 高德 framework 用了 C++ 标准库和 nlohmann json, 需要 link libc++
      - sdk: libc++.tbd
      # 高德用了 WiFi 定位 (CNCopyCurrentNetworkInfo 等), 需要 SystemConfiguration
      - sdk: SystemConfiguration.framework
      # CoreLocation 已在 Info.plist 声明, link 一下以防 SDK 内部依赖
      - sdk: CoreLocation.framework
      # 高德 3D 地图用了 OpenGL ES (GLKMatrix4Identity 等), 需要 GLKit
      - sdk: GLKit.framework
      # GLKit 依赖 OpenGLES
      - sdk: OpenGLES.framework
      # 高德用了运营商信息定位 (CTTelephonyNetworkInfo)
      - sdk: CoreTelephony.framework
      # 高德需要 zlib (libz) 压缩
      - sdk: libz.tbd
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: "zh_CN"
        LSRequiresIPhoneOS: true
        MinimumOSVersion: "16.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # ---- CoreLocation 三件套 (iOS 16+) ----
        # 见 architecture.md §5 App Store 审核合规
        NSLocationWhenInUseUsageDescription: "我们需要在 App 打开时获取你的位置，用于显示你与伴侣的实时距离。位置数据仅在 App 运行时使用，不会用于广告。"
        NSLocationAlwaysAndWhenInUseUsageDescription: '开启"始终"权限后，即便 App 在后台或锁屏，我们也能持续为你和伴侣更新位置，守护彼此安全。我们采用 Apple 推荐的 CoreLocation 后台服务模式，仅在位置发生显著变化时上报，不会持续高频采集。'
        NSLocationAlwaysUsageDescription: "保留此字段以兼容 iOS 10 设备。我们仅在位置发生显著变化时上报位置，不会持续高频采集。"
        # ---- 后台运行模式 ----
        UIBackgroundModes:
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.lovetrack.app.refresh
        # ---- 高德 SDK Key (从 Secrets.xcconfig 注入, 不进 git) ----
        AMapAPIKey: $(AMAP_API_KEY)
        # ---- App Transport Security (允许明文 HTTP，连接到本地后端) ----
        # 生产环境务必用 HTTPS，仅开发期允许任意加载
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lovetrack.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        # 高德 SDK 用了 Objective-C 类别(category), 必须 -ObjC 才能让所有符号被链接
        OTHER_LDFLAGS: "-ObjC"
        # 高德 MAMapKit.framework 暂未提供 arm64-simulator slice (2026-06 下载的版本)
        # 在 Apple Silicon Mac 上 iOS Simulator 默认走 arm64-simulator, 链接会失败
        # 临时方案: 模拟器只编 x86_64 (Rosetta), 真机走 arm64
        # 解决路径: 升级到带 arm64-simulator 的 SDK 版本 (Sprint 2 跟进)
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": arm64
        "ONLY_ACTIVE_ARCH[config=Debug]": YES
